<svg viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="netTitle">
  <title id="netTitle">Illustration of connected nodes representing the network monitoring dashboard</title>
  <rect width="400" height="240" fill="#1f2330"/>
  <g stroke="#2b2f3f" stroke-width="2">
    <line x1="120" y1="90" x2="200" y2="60"/>
    <line x1="200" y1="60" x2="280" y2="100"/>
    <line x1="120" y1="90" x2="180" y2="160"/>
    <line x1="200" y1="60" x2="240" y2="170"/>
    <line x1="280" y1="100" x2="240" y2="170"/>
  </g>
  <circle cx="120" cy="90" r="10" fill="#22c1a2"/>
  <circle cx="200" cy="60" r="10" fill="#7c5cff"/>
  <circle cx="280" cy="100" r="10" fill="#ff9f5b"/>
  <circle cx="180" cy="160" r="10" fill="#22c1a2"/>
  <circle cx="240" cy="170" r="10" fill="#7c5cff"/>
</svg>
